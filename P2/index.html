<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡BOOM! - Minnie Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <main class="game-container">
            <header>
                <h1 class="glitch-title">¡BOOM!</h1>
                <p class="subtitle">🩷¡Ayuda a Minnie a desactivar la clave!🩷 Pulsa Start o un número para comenzar.</p>
            </header>
            
            <div class="display-section">
                <div id="secret-key" class="key-container">
                    <div class="digit-box"><span class="digit" data-index="0">*</span></div>
                    <div class="digit-box"><span class="digit" data-index="1">*</span></div>
                    <div class="digit-box"><span class="digit" data-index="2">*</span></div>
                    <div class="digit-box"><span class="digit" data-index="3">*</span></div>
                </div>
                
                <div class="stats-panel">
                    <div class="stat-item">
                        <span class="label">INTENTOS</span>
                        <span id="attempts" class="value">7</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">TIEMPO</span>
                        <span id="timer" class="value">00:00</span>
                    </div>
                </div>
            </div>

            <div class="keyboard-wrapper">
                <div id="keyboard" class="keyboard"></div>
            </div>

            <div class="controls">
                <button id="btn-reset" class="btn-main">RESET</button>
                
                <div class="secondary-controls">
                    <button id="btn-start" class="btn-main">START</button>
                    <button id="btn-stop" class="btn-main">STOP</button>
                </div>
            </div>

            <div id="message" class="message-panel hidden">
                <img id="status-image" 
                    src="A" 
                    alt="Estado" 
                    style="width: 140px; margin-bottom: 15px; display: none; border: 4px solid white; border-radius: 15px;">
                <div id="message-text"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
